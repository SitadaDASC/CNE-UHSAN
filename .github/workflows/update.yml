name: Actualizar GeoJSON automático

on:
  workflow_dispatch:
  schedule:
    - cron: "5 * * * *"   # cada hora al minuto 5 (UTC)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generar GeoJSON desde Google Sheets TSV
        env:
          SHEET_TSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9pLqOjHIgEKADJ2Aa2EFJukOClpbJk6fShhi4M6jUyuDFsRU7WvEZ13gsUswKudI70dWNIm8Wypsp/pub?gid=0&single=true&output=tsv"
          OUTPUT_PATH: "docs/CNE-UHSAN.geojson"
          POINT_LON_FIELD: "X"
          POINT_LAT_FIELD: "Y"
          INPUT_EPSG: "5367"
        run: python update_geojson.py

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/CNE-UHSAN.geojson
          git diff --cached --quiet || git commit -m "chore: actualizar CNE-UHSAN.geojson (auto)"
          git push


